<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PICASso GRC — Application Functionality Map</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; background: #0d1117; color: #c9d1d9; overflow: hidden; }

    #app { display: flex; height: 100vh; width: 100vw; }

    /* Sidebar */
    #sidebar {
      width: 340px; min-width: 340px; background: #161b22; border-right: 1px solid #30363d;
      display: flex; flex-direction: column; z-index: 10;
    }
    #sidebar-header { padding: 16px; border-bottom: 1px solid #30363d; }
    #sidebar-header h1 { font-size: 16px; color: #58a6ff; margin-bottom: 4px; }
    #sidebar-header p { font-size: 11px; color: #8b949e; }

    /* Search */
    #search-box {
      padding: 12px 16px; border-bottom: 1px solid #30363d;
    }
    #search-input {
      width: 100%; padding: 8px 12px; background: #0d1117; border: 1px solid #30363d;
      border-radius: 6px; color: #c9d1d9; font-size: 13px; outline: none;
    }
    #search-input:focus { border-color: #58a6ff; }
    #search-input::placeholder { color: #484f58; }

    /* Legend */
    #legend { padding: 12px 16px; border-bottom: 1px solid #30363d; }
    #legend h3 { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .legend-item { display: flex; align-items: center; gap: 8px; padding: 3px 0; font-size: 12px; cursor: pointer; }
    .legend-item:hover { color: #f0f6fc; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .legend-line { width: 24px; height: 2px; flex-shrink: 0; border-radius: 1px; }

    /* Stats */
    #stats { padding: 12px 16px; border-bottom: 1px solid #30363d; }
    #stats h3 { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .stat-row { display: flex; justify-content: space-between; padding: 2px 0; font-size: 12px; }
    .stat-value { color: #58a6ff; font-weight: 600; }

    /* Node Detail Panel */
    #detail-panel {
      flex: 1; overflow-y: auto; padding: 16px;
    }
    #detail-panel h3 { font-size: 14px; color: #58a6ff; margin-bottom: 8px; }
    #detail-panel .detail-label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 12px; margin-bottom: 4px; }
    #detail-panel .detail-value { font-size: 13px; color: #c9d1d9; line-height: 1.5; }
    #detail-panel .detail-list { list-style: none; padding: 0; }
    #detail-panel .detail-list li { font-size: 12px; padding: 2px 0; color: #c9d1d9; }
    #detail-panel .detail-list li::before { content: '•'; color: #58a6ff; margin-right: 6px; }
    .coverage-badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600;
    }
    .coverage-partial { background: rgba(210,153,34,0.2); color: #d29922; }
    .coverage-full { background: rgba(63,185,80,0.2); color: #3fb950; }
    .coverage-none { background: rgba(248,81,73,0.2); color: #f85149; }
    .tag { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; margin: 1px 2px; background: #21262d; color: #8b949e; }

    /* Canvas area */
    #graph-container { flex: 1; position: relative; }
    svg { width: 100%; height: 100%; }

    /* Tooltip */
    #tooltip {
      position: absolute; pointer-events: none; background: #1c2128; border: 1px solid #30363d;
      border-radius: 8px; padding: 12px 16px; font-size: 12px; max-width: 320px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4); opacity: 0; transition: opacity 0.15s;
      z-index: 100;
    }
    #tooltip.visible { opacity: 1; }
    #tooltip h4 { font-size: 13px; color: #58a6ff; margin-bottom: 4px; }
    #tooltip .tt-type { font-size: 11px; color: #8b949e; margin-bottom: 6px; }
    #tooltip .tt-desc { font-size: 12px; color: #c9d1d9; line-height: 1.4; }
    #tooltip .tt-url { font-size: 11px; color: #484f58; margin-top: 4px; word-break: break-all; }

    /* Controls overlay */
    #controls {
      position: absolute; bottom: 16px; right: 16px; display: flex; gap: 6px; z-index: 10;
    }
    .ctrl-btn {
      width: 36px; height: 36px; background: #21262d; border: 1px solid #30363d;
      border-radius: 8px; color: #c9d1d9; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.15s;
    }
    .ctrl-btn:hover { background: #30363d; border-color: #484f58; }

    /* Badge overlay */
    #info-badge {
      position: absolute; top: 12px; right: 12px; background: #161b22; border: 1px solid #30363d;
      border-radius: 8px; padding: 8px 14px; font-size: 11px; color: #8b949e; z-index: 10;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #484f58; }
  </style>
</head>

      <div class="legend-item"><div class="legend-line" style="background:#bc8cff"></div>Mode Switch</div>
    </div>
    <div id="detail-panel">

  <div id="graph-container">

Object.entries(linkColors).forEach(([type, color]) => {

    .attr("markerHeight", 6)
    .attr("orient", "auto")
    .append("path")
    .attr("d", "M0,0 L10,3 L0,6 Z")
    .attr("fill", color)
    .attr("opacity", 0.6);
  // Dimmed marker (used during highlight)
  defs.append("marker")
    .attr("id", `arrow-${type}-dim`)

    .attr("refY", 3)
    .attr("markerWidth", 8)
    .attr("markerHeight", 6)
    .attr("orient", "auto")
    .append("path")
    .attr("d", "M0,0 L10,3 L0,6 Z")

});

// Green arrow for Login → Landing (slightly smaller than regular)

  .append("path")

// Dimmed login arrow
defs.append("marker")

// ===== ZOOM =====
const zoom = d3.zoom().scaleExtent([0.2, 4]).on("zoom", (e) => g.attr("transform", e.transform));
svg.call(zoom);

// ===== SIMULATION =====
const simulation = d3.forceSimulation(mapData.nodes)
  .force("link", d3.forceLink(mapData.links).id(d => d.id).distance(d => {
    if (d.type === "tab-switch") return 180;
    if (isPeripheral(d.type)) return 300;
    return 320;
  }))
  .force("charge", d3.forceManyBody().strength(d => isPeripheral(d.type) ? -400 : -1200))
  .force("center", d3.forceCenter(width / 2, height / 2))
  .force("collision", d3.forceCollide().radius(d => getR(d) + 50))
  .force("x", d3.forceX(width / 2).strength(0.02))
  .force("y", d3.forceY(height / 2).strength(0.02));

// ===== LINKS =====
const link = g.append("g").selectAll("line")
  .data(mapData.links)
  .join("line")
  .attr("stroke", d => {
    const sid = d.source.id || d.source;
    if (sid === "login") return "#3fb950";
    return linkColors[d.type] || "#30363d";
  })
  .attr("stroke-width", d => {
    const sid = d.source.id || d.source;
    if (sid === "login") return 1;
    return isPeripheral(d.type) ? 1 : 1.5;
  })
  .attr("stroke-opacity", d => {
    const sid = d.source.id || d.source;
    if (sid === "login") return 0.45;
    return isPeripheral(d.type) ? 0.35 : 0.5;
  })
  .attr("stroke-dasharray", d => {
    if (d.wip) return "4,3";
    if (d.type === "external") return "6,3";
    if (d.type === "unmapped") return "2,4";
    return d.type === "mode-switch" ? "6,3" : null;
  })
  .attr("marker-end", d => {
    const sid = d.source.id || d.source;
    if (sid === "login") return "url(#arrow-login)";
    return `url(#arrow-${d.type})`;
  });

// Pre-compute label offsets for links sharing the same node pair
const labelLinks = mapData.links.filter(d => !isPeripheral(d.type) && d.type !== "tab-switch");
(function computeLabelOffsets() {
  const pairMap = {};
  labelLinks.forEach(l => {
    const a = typeof l.source === "object" ? l.source.id : l.source;
    const b = typeof l.target === "object" ? l.target.id : l.target;
    const key = [a, b].sort().join("|");
    if (!pairMap[key]) pairMap[key] = [];
    pairMap[key].push(l);
  });
  Object.values(pairMap).forEach(group => {
    group.forEach((l, i) => {
      l._labelOffset = (i - (group.length - 1) / 2) * 14;
    });
  });
})();

// Link labels
const linkLabel = g.append("g").selectAll("text")
  .data(labelLinks)
  .join("text")
  .attr("font-size", 9)
  .attr("fill", "#484f58")
  .attr("text-anchor", "middle")
  .attr("dy", -4)
  .text(d => d.label);

// ===== NODES =====
const node = g.append("g").selectAll("g")
  .data(mapData.nodes)
  .join("g")
  .attr("cursor", "pointer")
  .call(d3.drag()
    .on("start", dragStarted)
    .on("drag", dragged)
    .on("end", dragEnded));

// Coverage ring (hidden — data kept in nodes for future use)
node.append("circle")
  .attr("r", d => getR(d) + 3)
  .attr("fill", "none")
  .attr("stroke", "transparent")
  .attr("stroke-width", 0)
  .attr("opacity", 0);

// Main circle
node.append("circle")
  .attr("r", d => getR(d))
  .attr("fill", d => {
    if (d.id === "login") return "#3fb950";
    return nodeColors[d.type];
  })
  .attr("opacity", d => isPeripheral(d.type) ? 0.5 : 0.85)
  .attr("stroke", d => d.wip ? "#e6edf3" : isPeripheral(d.type) ? nodeColors[d.type] : "transparent")
  .attr("stroke-width", d => d.wip ? 2 : isPeripheral(d.type) ? 1.5 : 1)
  .attr("stroke-dasharray", d => d.wip ? "4,3" : null)
  .attr("filter", d => (d.type === "page" || d.id === "login") ? "url(#glow)" : null);

// Node icon/emoji
const icons = { page: "📄", tab: "📑", dialog: "💬", excluded: "🚫", external: "↗️", unmapped: "📦" };
node.append("text")
  .attr("text-anchor", "middle")
  .attr("dy", "0.35em")
  .attr("font-size", d => (d.type === "excluded" || d.type === "external") ? 11 : (d.type === "page" || d.type === "unmapped") ? 14 : 11)
  .text(d => d.id === "login" ? "👤" : icons[d.type]);

// Node label
node.append("text")
  .attr("text-anchor", "middle")
  .attr("dy", d => getR(d) + 14)
  .attr("font-size", d => (d.type === "excluded" || d.type === "external") ? 9 : d.type === "page" || d.type === "unmapped" ? 12 : 10)
  .attr("fill", d => {
    if (d.id === "login") return "#3fb950";
    if (d.type === "external") return "#f85149";
    if (d.type === "unmapped") return "#ffa657";
    return isPeripheral(d.type) ? "#484f58" : "#c9d1d9";
  })
  .attr("font-weight", d => d.type === "page" ? 600 : 400)
  .text(d => d.label);

// ===== TOOLTIP =====
const tooltip = document.getElementById("tooltip");

node.on("mouseenter", (event, d) => {
  tooltip.innerHTML = `
    <h4>${d.label}</h4>
    <div class="tt-type">${d.type.toUpperCase()}</div>
    <div class="tt-desc">${d.desc || ""}</div>
    ${d.url ? `<div class="tt-url">${d.url}</div>` : ""}
    ${d.elements?.length ? `<div class="tt-desc" style="margin-top:6px; color:#8b949e;">${d.elements.length} elements</div>` : ""}
  `;
  tooltip.classList.add("visible");
})
.on("mousemove", (event) => {
  const rect = container.getBoundingClientRect();
  let x = event.clientX - rect.left + 15;
  let y = event.clientY - rect.top - 10;
  if (x + 320 > rect.width) x = event.clientX - rect.left - 335;
  if (y + 200 > rect.height) y = event.clientY - rect.top - 150;
  tooltip.style.left = x + "px";
  tooltip.style.top = y + "px";
})
.on("mouseleave", () => tooltip.classList.remove("visible"));

function showDetail(d) {
  const panel = document.getElementById("detail-panel");
  let html = `<h3>${d.label}</h3>`;
  if (d.wip) html += `<div style="background:#5e3a0a;color:#ffa657;border-radius:4px;padding:2px 8px;font-size:11px;display:inline-block;margin-bottom:8px;">⏳ Work in Progress</div>`;
  html += `<div class="detail-label">Type</div><div class="detail-value">${d.type.toUpperCase()}</div>`;

  if (d.url) {
    html += `<div class="detail-label">URL Pattern</div><div class="detail-value" style="font-family:monospace; font-size:11px;">${d.url}</div>`;
  }

  if (d.desc) {
    html += `<div class="detail-label">Description</div><div class="detail-value">${d.desc}</div>`;
  }

  if (d.elements?.length) {
    html += `<div class="detail-label">Elements (${d.elements.length})</div><ul class="detail-list">`;
    d.elements.forEach(el => { html += `<li>${el}</li>`; });
    html += `</ul>`;
  }

  if (d.tests?.length) {
    html += `<div class="detail-label">Test Files</div>`;
    d.tests.forEach(t => { html += `<span class="tag">${t}</span>`; });
  }

  // Show connected nodes
  const connected = mapData.links
    .filter(l => (l.source.id || l.source) === d.id || (l.target.id || l.target) === d.id)
    .map(l => {
      const otherId = (l.source.id || l.source) === d.id ? (l.target.id || l.target) : (l.source.id || l.source);
      const otherNode = mapData.nodes.find(n => n.id === otherId);
      return otherNode ? `${l.label || l.type} → ${otherNode.label}` : null;
    })
    .filter(Boolean);

  if (connected.length) {
    html += `<div class="detail-label">Connections (${connected.length})</div><ul class="detail-list">`;
    connected.forEach(c => { html += `<li>${c}</li>`; });
    html += `</ul>`;
  }

  panel.innerHTML = html;
}

// ===== HIGHLIGHT =====
function highlightNode(d) {
  const connectedIds = new Set([d.id]);
  mapData.links.forEach(l => {
    const sid = l.source.id || l.source;
    const tid = l.target.id || l.target;
    if (sid === d.id) connectedIds.add(tid);
    if (tid === d.id) connectedIds.add(sid);
  });

  node.selectAll("circle").transition().duration(200)
    .attr("opacity", n => connectedIds.has(n.id) ? (isPeripheral(n.type) ? 0.5 : 1) : 0.15);
  node.selectAll("text").transition().duration(200)
    .attr("opacity", n => connectedIds.has(n.id) ? 1 : 0.15);
  link.transition().duration(200)
    .attr("stroke-opacity", l => {
      const sid = l.source.id || l.source;
      const tid = l.target.id || l.target;
      return (sid === d.id || tid === d.id) ? 0.8 : 0.05;
    })
    .attr("marker-end", l => {
      const sid = l.source.id || l.source;
      const tid = l.target.id || l.target;
      const connected = (sid === d.id || tid === d.id);
      if (sid === "login") return connected ? "url(#arrow-login)" : "url(#arrow-login-dim)";
      return connected ? `url(#arrow-${l.type})` : `url(#arrow-${l.type}-dim)`;
    });
  linkLabel.transition().duration(200)
    .attr("opacity", l => {
      const sid = l.source.id || l.source;
      const tid = l.target.id || l.target;
      return (sid === d.id || tid === d.id) ? 1 : 0.05;
    });
}

function resetHighlight() {
  node.selectAll("circle").transition().duration(200)
    .attr("opacity", d => isPeripheral(d.type) ? 0.5 : 0.85);
  node.selectAll("text").transition().duration(200).attr("opacity", 1);
  link.transition().duration(200)
    .attr("stroke-opacity", d => {
      const sid = d.source.id || d.source;
      if (sid === "login") return 0.7;
      return isPeripheral(d.type) ? 0.35 : 0.5;
    })
    .attr("marker-end", d => {
      const sid = d.source.id || d.source;
      if (sid === "login") return "url(#arrow-login)";
      return `url(#arrow-${d.type})`;
    });
  linkLabel.transition().duration(200).attr("opacity", 1);
}

// ===== SEARCH =====
const searchInput = document.getElementById("search-input");
searchInput.addEventListener("input", () => {
  const q = searchInput.value.toLowerCase().trim();
  if (!q) {
    resetHighlight();
    return;
  }
  const matchIds = new Set();
  mapData.nodes.forEach(n => {
    const searchable = [n.label, n.desc, n.url, ...(n.elements || []), ...(n.tests || [])].join(" ").toLowerCase();
    if (searchable.includes(q)) matchIds.add(n.id);
  });

  node.selectAll("circle").transition().duration(200)
    .attr("opacity", d => matchIds.has(d.id) ? 1 : 0.1);
  node.selectAll("text").transition().duration(200)
    .attr("opacity", d => matchIds.has(d.id) ? 1 : 0.1);
  link.transition().duration(200).attr("stroke-opacity", 0.05)
    .attr("marker-end", d => {
      const sid = d.source.id || d.source;
      if (sid === "login") return "url(#arrow-login-dim)";
      return `url(#arrow-${d.type}-dim)`;
    });
  linkLabel.transition().duration(200).attr("opacity", 0.05);

  // Show first match in detail
  if (matchIds.size > 0) {
    const first = mapData.nodes.find(n => matchIds.has(n.id));
    if (first) showDetail(first);
  }
});

// ===== LEGEND FILTER =====
document.querySelectorAll(".legend-item[data-type]").forEach(el => {
  el.addEventListener("click", () => {
    const type = el.dataset.type;
    const matchIds = new Set(
      type === "wip"
        ? mapData.nodes.filter(n => n.wip).map(n => n.id)
        : mapData.nodes.filter(n => n.type === type).map(n => n.id)
    );

    node.selectAll("circle").transition().duration(200)
      .attr("opacity", d => matchIds.has(d.id) ? 1 : 0.1);
    node.selectAll("text").transition().duration(200)
      .attr("opacity", d => matchIds.has(d.id) ? 1 : 0.1);

    setTimeout(resetHighlight, 2000);
  });
});

// ===== CONTROLS =====
document.getElementById("btn-zoom-in").onclick = () => svg.transition().duration(300).call(zoom.scaleBy, 1.5);
document.getElementById("btn-zoom-out").onclick = () => svg.transition().duration(300).call(zoom.scaleBy, 0.67);
document.getElementById("btn-reset").onclick = () => svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(width/2, height/2).scale(0.8).translate(-width/2, -height/2));
document.getElementById("btn-fullscreen").onclick = () => {
  if (document.fullscreenElement) document.exitFullscreen();
  else document.documentElement.requestFullscreen();
};

// ===== SIMULATION TICK =====
simulation.on("tick", () => {
  link
    .attr("x1", d => d.source.x)
    .attr("y1", d => d.source.y)
    .attr("x2", d => {
      const dx = d.target.x - d.source.x;
      const dy = d.target.y - d.source.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      return d.target.x - (dx / dist) * getR(d.target);
    })
    .attr("y2", d => {
      const dx = d.target.x - d.source.x;
      const dy = d.target.y - d.source.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      return d.target.y - (dy / dist) * getR(d.target);
    });

  linkLabel
    .attr("x", d => {
      const mx = (d.source.x + d.target.x) / 2;
      if (!d._labelOffset) return mx;
      const dx = d.target.x - d.source.x;
      const dy = d.target.y - d.source.y;
      const len = Math.sqrt(dx * dx + dy * dy) || 1;
      return mx + (-dy / len) * d._labelOffset;
    })
    .attr("y", d => {
      const my = (d.source.y + d.target.y) / 2;
      if (!d._labelOffset) return my;
      const dx = d.target.x - d.source.x;
      const dy = d.target.y - d.source.y;
      const len = Math.sqrt(dx * dx + dy * dy) || 1;
      return my + (dx / len) * d._labelOffset;
    });

  node.attr("transform", d => `translate(${d.x},${d.y})`);
});

// ===== DRAG =====
function dragStarted(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
function dragEnded(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

// ===== INITIAL VIEW =====
setTimeout(() => {
  svg.transition().duration(800).call(
    zoom.transform,
    d3.zoomIdentity.translate(width * 0.1, height * 0.1).scale(0.85)
  );
}, 500);
</script>
</body>
</html>
